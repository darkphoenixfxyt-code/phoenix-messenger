<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Messenger Offline</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0d12; color: #f8fafc; font: 15px system-ui, sans-serif; }
    main { width: min(460px, 90vw); padding: 34px; text-align: center; border: 1px solid rgba(255,255,255,.1); border-radius: 16px; background: rgba(24,27,36,.9); box-shadow: 0 24px 70px rgba(0,0,0,.45), 0 0 45px rgba(255,107,35,.1); }
    .mark { width: 72px; height: 72px; margin: 0 auto 22px; display: grid; place-items: center; border-radius: 22px; background: linear-gradient(145deg,#ff6b23,#8b5cf6); font-size: 30px; transform: rotate(45deg); }
    .mark span { transform: rotate(-45deg); }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0; color: #9298a8; line-height: 1.6; }
  </style>
</head>
<body><main><div class="mark"><span>◆</span></div><h1>Phoenix Messenger requires an internet connection.</h1><p>Reconnect to the internet, then restart Phoenix Messenger.</p></main></body>
</html>
