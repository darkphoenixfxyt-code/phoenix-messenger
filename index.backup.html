<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift — Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --bg2: #18181c;
    --bg3: #222228;
    --bg4: #2c2c35;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f2;
    --text2: #9898a8;
    --text3: #5a5a6e;
    --accent: #6c63ff;
    --accent2: #4f46e5;
    --accent-glow: rgba(108,99,255,0.22);
    --green: #22c55e;
    --font: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

  .app { display: grid; grid-template-columns: 64px 280px 1fr; height: 100vh; }

  /* RAIL */
  .rail {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0; gap: 4px;
    border-right: 1px solid var(--border);
  }
  .rail-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; cursor: pointer;
    box-shadow: 0 0 24px var(--accent-glow);
  }
  .rail-logo svg { width: 20px; height: 20px; fill: white; }
  .rail-btn {
    width: 40px; height: 40px; border-radius: 10px; border: none;
    background: transparent; color: var(--text3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .rail-btn:hover { background: var(--bg3); color: var(--text2); }
  .rail-btn.active { background: var(--bg3); color: var(--accent); }
  .rail-spacer { flex: 1; }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(108,99,255,0.15); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 2px solid rgba(108,99,255,0.3); margin-top: 8px;
  }

  /* SIDEBAR */
  .sidebar {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px; border: none;
    background: var(--bg3); color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--bg4); color: var(--text); }

  .search-wrap { padding: 0 12px 14px; }
  .search-wrap-inner { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-input {
    width: 100%; padding: 8px 12px 8px 32px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: rgba(108,99,255,0.5); }

  .tabs { display: flex; padding: 0 12px 10px; gap: 4px; }
  .tab {
    flex: 1; padding: 6px; border-radius: 8px; border: none;
    background: transparent; color: var(--text3); font-family: var(--font);
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .tab:hover { color: var(--text2); background: var(--bg3); }
  .tab.active { background: var(--bg3); color: var(--text); }

  /* EMPTY SIDEBAR STATE */
  .sidebar-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px; gap: 12px; text-align: center;
  }
  .sidebar-empty-icon {
    width: 52px; height: 52px; border-radius: 16px;
    background: var(--bg3); display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  .sidebar-empty h3 { font-size: 14px; font-weight: 500; color: var(--text2); }
  .sidebar-empty p { font-size: 12px; color: var(--text3); line-height: 1.5; max-width: 180px; }
  .new-chat-btn {
    margin-top: 4px; padding: 8px 18px; border-radius: 10px; border: none;
    background: var(--accent); color: white; font-family: var(--font);
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .new-chat-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* CHAT AREA */
  .chat { display: flex; flex-direction: column; overflow: hidden; }

  /* EMPTY CHAT STATE */
  .chat-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 40px;
    text-align: center;
  }
  .chat-empty-icon {
    width: 72px; height: 72px; border-radius: 22px;
    background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
  }
  .chat-empty h2 {
    font-size: 20px; font-weight: 600; letter-spacing: -0.4px;
    color: var(--text);
  }
  .chat-empty p { font-size: 14px; color: var(--text3); line-height: 1.6; max-width: 300px; }
  .chat-empty-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
  .action-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 12px;
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text2); font-family: var(--font); font-size: 13px;
    cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .action-chip:hover { background: var(--bg4); color: var(--text); border-color: rgba(108,99,255,0.3); }
  .action-chip svg { flex-shrink: 0; }

  /* NEW CHAT MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
    width: 400px; max-width: 90vw; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    animation: popIn 0.18s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 6px; transition: color 0.1s; }
  .modal-close:hover { color: var(--text); }
  .modal-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: rgba(108,99,255,0.5); }
  .modal-input::placeholder { color: var(--text3); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
  .btn-ghost {
    padding: 8px 16px; border-radius: 9px; border: 1px solid var(--border2);
    background: transparent; color: var(--text2); font-family: var(--font);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-primary {
    padding: 8px 16px; border-radius: 9px; border: none;
    background: var(--accent); color: white; font-family: var(--font);
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); }

  /* ACTIVE CHAT VIEW */
  .chat-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: none;
  }
  .chat-header.visible { display: flex; }
  .chat-user-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .chat-user-status { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .chat-actions { display: flex; gap: 4px; margin-left: auto; }

  .messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: none; flex-direction: column; gap: 4px;
  }
  .messages.visible { display: flex; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.18s ease; }
  .msg-row.mine { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .msg-avatar-sm {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; margin-bottom: 2px;
  }
  .bubble {
    max-width: 480px; padding: 9px 13px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
  }
  .bubble.theirs { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; }
  .bubble.mine { background: var(--accent); color: white; border-bottom-right-radius: 4px; }

  .input-area {
    padding: 12px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: none;
  }
  .input-area.visible { display: block; }
  .input-toolbar { display: flex; gap: 2px; margin-bottom: 8px; }
  .toolbar-btn {
    padding: 5px 8px; border-radius: 6px; border: none;
    background: transparent; color: var(--text3); cursor: pointer; transition: all 0.1s;
  }
  .toolbar-btn:hover { background: var(--bg3); color: var(--text2); }
  .input-row { display: flex; align-items: flex-end; gap: 8px; }
  .input-box {
    flex: 1; min-height: 42px; max-height: 120px; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; resize: none; line-height: 1.5; overflow-y: auto;
    transition: border-color 0.15s;
  }
  .input-box:focus { border-color: var(--border2); }
  .input-box:empty::before { content: attr(data-placeholder); color: var(--text3); pointer-events: none; }
  .send-btn {
    width: 42px; height: 42px; border-radius: 12px; border: none;
    background: var(--accent); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    box-shadow: 0 4px 12px var(--accent-glow);
  }
  .send-btn:hover { background: var(--accent2); transform: scale(1.04); }

  /* CONVO LIST items (populated dynamically) */
  .convo-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .convo-list::-webkit-scrollbar { width: 4px; }
  .convo-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
  .convo-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 8px; border-radius: 12px; cursor: pointer;
    transition: background 0.1s; position: relative;
  }
  .convo-item:hover { background: var(--bg3); }
  .convo-item.active { background: var(--bg3); }
  .convo-item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .c-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .convo-info { flex: 1; min-width: 0; }
  .convo-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .convo-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
</style>
</head>
<body>

<div class="app">

  <!-- RAIL -->
  <nav class="rail">
    <div class="rail-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.913 1.408 5.517 3.605 7.227L4.5 22l3.985-1.99A10.82 10.82 0 0012 20.486c5.523 0 10-4.145 10-9.243S17.523 2 12 2z"/></svg>
    </div>
    <button class="rail-btn active" title="Messages">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="rail-btn" title="Calls">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 12a19.79 19.79 0 0 1-3-8.59A2 2 0 0 1 3.72 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </button>
    <button class="rail-btn" title="Contacts">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button class="rail-btn" title="Saved">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div class="rail-spacer"></div>
    <button class="rail-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="user-avatar">A</div>
  </nav>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Messages</span>
      <div style="display:flex;gap:4px;">
        <button class="icon-btn" title="New message" onclick="openModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-wrap-inner">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search…" id="searchInput" oninput="filterConvos()">
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab(this,'all')">All</button>
      <button class="tab" onclick="setTab(this,'unread')">Unread</button>
      <button class="tab" onclick="setTab(this,'groups')">Groups</button>
    </div>

    <!-- Dynamic list -->
    <div class="convo-list" id="convoList"></div>

    <!-- Empty state (shown when no convos) -->
    <div class="sidebar-empty" id="sidebarEmpty">
      <div class="sidebar-empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5a5a6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h3>No conversations yet</h3>
      <p>Start a new chat to connect with someone</p>
      <button class="new-chat-btn" onclick="openModal()">+ New message</button>
    </div>
  </aside>

  <!-- CHAT PANEL -->
  <section class="chat">

    <!-- Active chat header (hidden until a convo is selected) -->
    <div class="chat-header" id="chatHeader">
      <div class="c-avatar" id="headerAvatar" style="width:38px;height:38px;font-size:13px;"></div>
      <div>
        <div class="chat-user-name" id="headerName"></div>
        <div class="chat-user-status" id="headerStatus"></div>
      </div>
      <div class="chat-actions">
        <button class="icon-btn" title="Voice call">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 12a19.79 19.79 0 0 1-3-8.59A2 2 0 0 1 3.72 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </button>
        <button class="icon-btn" title="Video call">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
        <button class="icon-btn" title="More">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area" id="inputArea">
      <div class="input-toolbar">
        <button class="toolbar-btn" title="Attach">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="toolbar-btn" title="Image">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button class="toolbar-btn" title="Emoji">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
      </div>
      <div class="input-row">
        <div class="input-box" id="inputBox" contenteditable="true" data-placeholder="Type a message…" role="textbox" aria-multiline="true"></div>
        <button class="send-btn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <!-- Empty chat state (no convo selected) -->
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.913 1.408 5.517 3.605 7.227L4.5 22l3.985-1.99A10.82 10.82 0 0012 20.486c5.523 0 10-4.145 10-9.243S17.523 2 12 2z"/></svg>
      </div>
      <h2>Welcome to Drift</h2>
      <p>Your messages live here. Start a conversation or search for someone to chat with.</p>
      <div class="chat-empty-actions">
        <button class="action-chip" onclick="openModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New message
        </button>
        <button class="action-chip">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Find contacts
        </button>
      </div>
    </div>

  </section>
</div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New message</span>
      <button class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input class="modal-input" id="recipientInput" type="text" placeholder="Name or username…" autofocus>
    <input class="modal-input" id="firstMessageInput" type="text" placeholder="Say something…">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="startChat()">Start chat</button>
    </div>
  </div>
</div>

<script>
  const COLORS = [
    {bg:'rgba(108,99,255,0.15)',fg:'#6c63ff'},
    {bg:'rgba(34,197,94,0.15)',fg:'#22c55e'},
    {bg:'rgba(245,158,11,0.15)',fg:'#f59e0b'},
    {bg:'rgba(239,68,68,0.15)',fg:'#ef4444'},
    {bg:'rgba(20,184,166,0.15)',fg:'#14b8a6'},
    {bg:'rgba(168,85,247,0.15)',fg:'#a855f7'},
    {bg:'rgba(59,130,246,0.15)',fg:'#3b82f6'},
  ];

  let convos = [];
  let activeId = null;

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function getColor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return COLORS[h % COLORS.length];
  }

  function renderSidebar() {
    const list = document.getElementById('convoList');
    const empty = document.getElementById('sidebarEmpty');
    list.innerHTML = '';

    if (convos.length === 0) {
      empty.style.display = 'flex';
      list.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    list.style.display = 'block';

    convos.forEach(c => {
      const col = getColor(c.name);
      const lastMsg = c.messages.length ? c.messages[c.messages.length - 1] : null;
      const preview = lastMsg ? (lastMsg.mine ? 'You: ' + lastMsg.text : lastMsg.text) : 'No messages yet';
      const div = document.createElement('div');
      div.className = 'convo-item' + (c.id === activeId ? ' active' : '');
      div.onclick = () => openConvo(c.id);
      div.innerHTML = `
        <div class="c-avatar" style="background:${col.bg};color:${col.fg};">${getInitials(c.name)}</div>
        <div class="convo-info">
          <div class="convo-name">${c.name}</div>
          <div class="convo-preview">${preview}</div>
        </div>`;
      list.appendChild(div);
    });
  }

  function openConvo(id) {
    activeId = id;
    const c = convos.find(x => x.id === id);
    const col = getColor(c.name);

    // header
    const header = document.getElementById('chatHeader');
    header.classList.add('visible');
    const av = document.getElementById('headerAvatar');
    av.textContent = getInitials(c.name);
    av.style.background = col.bg;
    av.style.color = col.fg;
    document.getElementById('headerName').textContent = c.name;
    document.getElementById('headerStatus').textContent = 'Click to start chatting';
    document.getElementById('headerStatus').style.color = 'var(--text3)';

    // messages
    const msgs = document.getElementById('messages');
    msgs.classList.add('visible');
    msgs.innerHTML = '';
    c.messages.forEach(m => appendBubble(m.text, m.mine, c, false));
    msgs.scrollTop = msgs.scrollHeight;

    // input
    const ia = document.getElementById('inputArea');
    ia.classList.add('visible');
    const box = document.getElementById('inputBox');
    box.setAttribute('data-placeholder', `Message ${c.name.split(' ')[0]}…`);
    box.focus();

    // hide empty state
    document.getElementById('chatEmpty').style.display = 'none';

    renderSidebar();
  }

  function appendBubble(text, mine, convo, scroll = true) {
    const msgs = document.getElementById('messages');
    const col = getColor(convo.name);
    const row = document.createElement('div');
    row.className = 'msg-row' + (mine ? ' mine' : '');

    if (!mine) {
      row.innerHTML = `
        <div class="msg-avatar-sm" style="background:${col.bg};color:${col.fg};">${getInitials(convo.name)}</div>
        <div class="bubble theirs">${text.replace(/</g,'&lt;')}</div>`;
    } else {
      row.innerHTML = `
        <div class="bubble mine">${text.replace(/</g,'&lt;')}</div>`;
    }
    msgs.appendChild(row);
    if (scroll) msgs.scrollTop = msgs.scrollHeight;
  }

  function sendMessage() {
    if (!activeId) return;
    const box = document.getElementById('inputBox');
    const text = box.innerText.trim();
    if (!text) return;
    const c = convos.find(x => x.id === activeId);
    c.messages.push({ text, mine: true });
    box.innerText = '';
    appendBubble(text, true, c);
    renderSidebar();
  }

  document.getElementById('inputBox').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Modal
  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('recipientInput').focus(), 50);
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('recipientInput').value = '';
    document.getElementById('firstMessageInput').value = '';
  }
  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function startChat() {
    const name = document.getElementById('recipientInput').value.trim();
    const msg = document.getElementById('firstMessageInput').value.trim();
    if (!name) { document.getElementById('recipientInput').focus(); return; }

    const existing = convos.find(c => c.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      closeModal();
      openConvo(existing.id);
      return;
    }

    const id = Date.now();
    const newConvo = { id, name, messages: [] };
    if (msg) newConvo.messages.push({ text: msg, mine: true });
    convos.unshift(newConvo);
    closeModal();
    renderSidebar();
    openConvo(id);
  }

  // Tab switching
  function setTab(el, type) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function filterConvos() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.convo-item').forEach(item => {
      item.style.display = item.querySelector('.convo-name').textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  // Rail buttons
  document.querySelectorAll('.rail-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Init
  renderSidebar();
</script>
</body>
</html>
